<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Facebook Login</title>
   
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <style>
      input:hover{
        border-color: black;
      }
       body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
     
      .login-container{
       padding: 20px;
       height: 614px;
       width: 600px;
       max-width: 100%;
       position: relative;
       margin-top:150px;


      }
      
      .form{
        margin-top: 8px;
        

       
      }
      .form-control{
      
       padding: 15px;
       border-radius: 20px;
       
      }
      .btn{
        padding: 10px;
      border-radius: 20px;

      }
      a{
        text-align: center;
        color: black;
         text-decoration: none;

      }
      a:hover{
        background-color: aliceblue;
      
      }
      @media(max-width:990px){
        .left-side{
          display: none;
        }
        .right-side{
          width: 100%;
        }
        .logo{
          justify-content: center;
          display: flex;
        }
      .container{
                margin-top: 50px;
                padding: 0;
                width: 100%;
                justify-content: center;
                 border-bottom:1px solid #dddfe2;

            }
            .d-grid{
             
              display: flex;
              flex-direction: column;
              
            }
         .mb-3{
           display: flex;
              flex-direction: column;
              margin-top: 20px;

         }
         button{
           margin: 20px 0px;

         }
            
          
  
             
          };
      
      
    </style>
</head>
<body>

<div class="container  d-flex align-items-center justify-content-center">
    <div class="row">
       <div class="logo">
                    <svg viewBox="0 0 16 16" width="60" height="60"><path fill="#1877F2" d="M15 8a7 7 0 00-7-7 7 7 0 00-1.094 13.915v-4.892H5.13V8h1.777V6.458c0-1.754 1.045-2.724 2.644-2.724.766 0 1.567.137 1.567.137v1.723h-.883c-.87 0-1.14.54-1.14 1.093V8h1.941l-.31 2.023H9.094v4.892A7.001 7.001 0 0015 8z"/></svg>
                </div>
        
      
        <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center left-side">
        <div class="content">
          
                <div class="img">
                   
                    <img src="83zWJdc6PJI.webp" alt="facebook" class="img-fluid">
          </div>
                <h1 class="heading">Explore<br> the <br>things <br> <span class="text"style=color:blue;>you love</span>.</h1>
            </div>
        </div>

        





        <div class="col-lg-6 d-flex flex-column justify-content-center align-items-center right-side width:100% ">
            
          
          
          <div style="border-top: 2px solid rgb(185, 181, 181);"></div>

            <div class="login-container">
                
          <form>
           <p class="login-title mb-4">Log into Facebook</p>
          <div class="form">
             <div class="mb-3  ">
       <input type="text" class="form-control custom-input" placeholder="Email or mobile number">
                    </div>
                    <div class="mb-3">
             <input type="password" class="form-control custom-input" placeholder="Password">
                    </div>
                    
            <div class="d-grid gap-2 mx-auto">
            <button type="submit" class="btn btn-primary">Log in</button>
                        <a class="link">Forgot password?</a>
                     <button type="button" class="btn btn-outline-primary">Create new account</button>
                     </div>
                     </div>
                    
                </form>

                
            </div>
        </div>

    </div>
</div>

</body>
</html>
